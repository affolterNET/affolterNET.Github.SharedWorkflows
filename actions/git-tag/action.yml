name: Git Tag
description: 'Creates a Git tag based on the provided version and prefix'

inputs:
  version:
    description: 'The version to use for the Git tag'
    required: true
  tag-prefix:
    description: 'The prefix to use for the Git tag'
    required: false
    default: ''
  registry-name:
    description: 'Azure Container Registry login server (e.g., myregistry.azurecr.io)'
    required: false
    default: ''
  image-name:
    description: 'Name of the Docker image'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for authentication'
    required: true
  build-file:
    description: 'Path to build configuration JSON file (reads registryName from docker.registryName, bypasses secret masking)'
    required: false
    default: ''
  scripts-version:
    description: 'Version of the scripts to use'
    required: false
    default: 'main'

outputs:
  tag-created:
    description: 'Whether the tag was created successfully'
    value: ${{ steps.create-tag.outputs.tag_created }}
  tag-name:
    description: 'Name of the created tag'
    value: ${{ steps.create-tag.outputs.tag_name }}
  version:
    description: 'Version that was tagged'
    value: ${{ steps.create-tag.outputs.version }}

runs:
  using: 'composite'
  steps:

  - name: Checkout code
    uses: affolterNET/affolterNET.Github.SharedWorkflows/actions/checkout@main
    
  - name: Get version scripts
    uses: affolterNET/affolterNET.Github.SharedWorkflows/actions/get-scripts@main
    with:
      scripts: "scripts/ci_tag.sh"
      scripts-version: ${{ inputs.scripts-version }}

  - name: Resolve registry name
    id: resolve-registry
    shell: bash
    run: |
      REGISTRY_NAME="${{ inputs.registry-name }}"
      if [ -z "$REGISTRY_NAME" ] && [ -n "${{ inputs.build-file }}" ] && [ -f "${{ inputs.build-file }}" ]; then
        REGISTRY_NAME=$(jq -r '.docker.registryName // empty' "${{ inputs.build-file }}")
        echo "Resolved registry-name from build file: $REGISTRY_NAME"
      fi
      echo "registry-name=$REGISTRY_NAME" >> $GITHUB_OUTPUT

  - name: Create Git tag
    id: create-tag
    shell: bash
    env:
      GITHUB_TOKEN: ${{ inputs.github-token }}
    run: |
      VERSION="${{ inputs.version }}"
      TAG_PREFIX="${{ inputs.tag-prefix }}"
      REGISTRY_NAME="${{ steps.resolve-registry.outputs.registry-name }}"
      IMAGE_NAME="${{ inputs.image-name }}"

      echo "Creating git tag using: ./scripts/ci_tag.sh $VERSION $TAG_PREFIX $REGISTRY_NAME $IMAGE_NAME"
      output=$(./scripts/ci_tag.sh "$VERSION" "$TAG_PREFIX" "$REGISTRY_NAME" "$IMAGE_NAME")
      echo "$output"
      echo "$output" >> $GITHUB_OUTPUT
